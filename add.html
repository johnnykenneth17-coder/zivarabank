<div class="admin-page" id="page-accounts">
  <div class="page-header">
    <h2>Account Oversight</h2>
    <div class="account-controls">
      <div class="user-selector">
        <select id="accountUserSelect" class="form-control">
          <option value="">Select User</option>
        </select>
      </div>
      <div class="account-actions">
        <button class="btn btn-warning" id="freezeAccountBtn">
          <i class="fas fa-ban"></i> Freeze Account
        </button>
        <button class="btn btn-success" id="unfreezeAccountBtn">
          <i class="fas fa-check"></i> Unfreeze Account
        </button>
        <button class="btn btn-primary" id="updateBalanceBtn">
          <i class="fas fa-dollar-sign"></i> Update Balance
        </button>
        <button class="btn btn-danger" id="impersonateBtn">
          <i class="fas fa-mask"></i> Impersonate
        </button>
      </div>
    </div>
    <div class="header-actions">
      <div class="search-filter">
        <input
          type="text"
          id="accountSearch"
          placeholder="Search by account #, email, name..."
        />
      </div>
      <select id="accountStatusFilter">
        <option value="">All Statuses</option>
        <option value="active">Active</option>
        <option value="frozen">Frozen</option>
        <option value="suspended">Suspended</option>
      </select>
    </div>
  </div>

  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Account #</th>
          <th>Owner</th>
          <th>Type</th>
          <th>Balance</th>
          <th>Available</th>
          <th>Status</th>
          <th>KYC</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="accountsTableBody">
        <!-- Filled by JS -->
      </tbody>
    </table>
  </div>

  <div class="pagination" id="accountsPagination"></div>
</div>
