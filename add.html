<!-- Location Information - Add after address field -->
<div class="form-row">
  <div class="form-group">
    <label for="age">Age</label>
    <div class="input-icon">
      <i class="fas fa-calendar-alt" style="display: none !important"></i>
      <input type="number" id="age" name="age" min="18" max="120" placeholder="25" required />
    </div>
  </div>
  <div class="form-group">
    <label for="identification_type">ID Type</label>
    <div class="input-icon">
      <i class="fas fa-id-card" style="display: none !important"></i>
      <select id="identification_type" name="identification_type" class="form-control" required style="padding-left: 10px; height: 43px;">
        <option value="">Select ID Type</option>
        <option value="nin">National Identification Number (NIN)</option>
        <option value="bvn">Bank Verification Number (BVN)</option>
        <option value="passport">International Passport</option>
        <option value="drivers_license">Driver's License</option>
        <option value="voters_card">Voter's Card</option>
      </select>
    </div>
  </div>
</div>

<div class="form-group">
  <label for="identification_number">Identification Number</label>
  <div class="input-icon">
    <i class="fas fa-hashtag" style="display: none !important"></i>
    <input type="text" id="identification_number" name="identification_number" placeholder="Enter your ID number" required />
  </div>
  <small class="form-hint" style="color: #64748b; font-size: 11px;">This helps verify your identity securely</small>
</div>
